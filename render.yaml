services:
  - type: web
    name: free-ai-gateway
    runtime: python
    buildCommand: ./build.sh
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: ADMIN_SECRET
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: CLOUDFLARE_API_KEY
        sync: false
      - key: CLOUDFLARE_ACCOUNT_ID
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: ROUTING_MODE
        value: "weighted"
      - key: DATABASE_URL
        sync: false
